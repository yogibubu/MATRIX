[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "oracle-gui"
version = "0.1.0"
description = "GUI controllers and views for ORACLE"
requires-python = ">=3.11"

[project.optional-dependencies]
qt = ["PySide6>=6.7"]

[project.scripts]
oracle-gui = "oracle_gui.app:main"

[tool.setuptools.packages.find]
where = ["src"]
