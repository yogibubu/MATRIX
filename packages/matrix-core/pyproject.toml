[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "matrix-core"
version = "0.1.0"
description = "Core MATRIX infrastructure"
requires-python = ">=3.11"

[project.scripts]
oracle = "matrix_core.cli:oracle_main"
matrix = "matrix_core.cli:matrix_main"
link = "matrix_core.cli:link_main"
neo = "matrix_core.cli:neo_main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
matrix_core = ["parameters/*.toml", "parameters/fortran/*.inc"]
