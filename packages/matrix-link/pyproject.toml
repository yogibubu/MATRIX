[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "matrix-link"
version = "0.1.0"
description = "LINK import and database adapters for MATRIX"
requires-python = ">=3.11"

[project.optional-dependencies]
rdkit = ["rdkit>=2024.3"]

[tool.setuptools.packages.find]
where = ["src"]
